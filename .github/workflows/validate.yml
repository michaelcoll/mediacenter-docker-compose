name: validate-docker-compose

on:
  pull_request:
  push:
    paths:
      - "**/docker-compose.yml"

jobs:
  validate:
    name: Validate Docker Compose files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate /admin/docker-compose.yml
        run: docker compose -f admin/docker-compose.yml config --quiet

      - name: Validate /media/docker-compose.yml
        run: docker compose -f media/docker-compose.yml config --quiet
